             - nome: Ação de verificação de fluxo de trabalho
  # Você pode fixar no commit exato ou na versão.
  # usos: rcowsill/workflow-scan-action@44f8d93636242a206270e196dbd3bd755962ac58
  usos: rcowsill/workflow-scan-action@v3.0.0
  com:
    # Lista separada por vírgulas de consultas adicionais a serem executadas
    consultas extras: # opcional, o padrão é
    # Se deve usar as consultas padrão do workflow-security-suite
    use-default-queries: # opcional, o padrão é verdadeiro
    # Se deve carregar o arquivo SARIF para o Code Scanning
    upload: # opcional, o padrão é verdadeiro
    # Nome do diretório que conterá os dados necessários para a ação
    data-dir-name: # opcional, o padrão é workflow-scan-action-data
          
