<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Esse e o meu primeiro site" />
  <meta name="Keywords" content="Html,Css,javaScript e pitão" />
  <meta name="Author" content="Leandro R Gomes" />
  <title>leandr3810-python-lord</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>
      <img src="images/brasão.png"  alt="Brasão" width="200" />
      Bem-vindo ao Meu Site
    </h1>
    <nav>
      <a href="#sobre">Sobre</a>
      <a href="#projetos">Projetos</a>
      <a href="#contato">Contato</a>
    </nav>
    <button id="translateButton">Translate</button>
  </header>

  <section id="sobre">
    <h2>Sobre Mim</h2>
    <p>Uma breve descrição sobre quem você é e o que faz.</p>
  </section>

  <section id="projetos">
    <h2>leandro3810-python-lord</h2>
    <p>Aqui você pode mostrar seus trabalhos ou portfólio.</p>
  </section>

  <section id="contato">
    <h2>Formulário de Contato</h2>
    <form id="contactForm">
      <label for="name">Nome:</label>
      <input type="text" id="name" name="name" required>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <label for="message">Mensagem:</label>
      <textarea id="message" name="message" required></textarea>
      <button type="submit">Enviar</button>
    </form>
  </section>

  <section id="estatisticas">
    <h2>Estatísticas</h2>
    <p id="stats">Carregando estatísticas...</p>
  </section>

  <footer>
    <p>&copy; 2025 Seu Nome. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
