<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Lord - Leandro3810</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="01_mclaren-senna_black_livery_2_resized.jpg
      " alt="Logotipo do Python Lord - Leandro3810" class="logo">
    <nav>
      <ul class="menu">
        <li><a href="https://www.google.com" target="_blank">Google</a></li>
        <li><a href="#configuracao">Configuração</a></li>
        <li><a href="#sobre">Sobre</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="pesquisa">
      <form onsubmit="realizarPesquisa(); return false;">
        <input type="text" id="searchBox" placeholder="Pesquisar no site...">
        <button type="submit">Pesquisar</button>
      </form>
    </section>
    <section id="configuracao">
      <h2>Configuração</h2>
      <p>.</p>
    </section>
    <section id="sobre">
      <h2>Sobre</h2>
      <p>Informações sobre o site Python Lord.</p>
    </section>
  </main>
  <script src="script.js">document.getElementById('contactForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    var name = document.getElementById('name').value;
    var email = document.getElementById('email').value;
    var message = document.getElementById('message').value;

    fetch('/api/contact', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ name: name, email: email, message: message }),
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            alert('Obrigado, ' + name + '! Sua mensagem foi enviada.');
        } else {
            alert('Desculpe, ocorreu um erro. Tente novamente.');
        }
    })
    .catch((error) => {
        console.error('Error:', error);
    });
});</script>
</body>
</html>
